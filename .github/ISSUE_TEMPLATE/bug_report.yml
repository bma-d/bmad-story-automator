name: Bug report
description: Report an install, runtime, or workflow-wrapper problem.
title: "[bug] "
labels:
  - bug
body:
  - type: dropdown
    id: layout
    attributes:
      label: BMAD layout
      options:
        - current (_bmad/bmm/4-implementation)
        - legacy (_bmad/bmm/workflows/4-implementation)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.8
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 20.18.0
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      placeholder: npx bmad-story-automator /path/to/project
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
    validations:
      required: true
